<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>TherapyCareNow — Offline</title>
    <meta name="theme-color" content="#0d9488" />
    <style>
      *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
      body {
        font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
        background: #f8fafc;
        color: #0f172a;
        min-height: 100vh;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        padding: 2rem;
        text-align: center;
      }
      .icon { font-size: 4rem; margin-bottom: 1.5rem; }
      h1 { font-size: 1.5rem; font-weight: 700; margin-bottom: 0.75rem; color: #0f172a; }
      p { color: #64748b; line-height: 1.6; max-width: 360px; margin-bottom: 2rem; }
      .crisis-box {
        background: #fef2f2;
        border: 2px solid #fca5a5;
        border-radius: 12px;
        padding: 1.25rem 1.5rem;
        max-width: 360px;
        margin-bottom: 2rem;
      }
      .crisis-box h2 { font-size: 1rem; font-weight: 700; color: #dc2626; margin-bottom: 0.5rem; }
      .crisis-box a {
        display: block;
        color: #dc2626;
        font-weight: 600;
        text-decoration: none;
        font-size: 1.125rem;
        margin: 0.25rem 0;
      }
      .retry-btn {
        background: #0d9488;
        color: white;
        border: none;
        border-radius: 10px;
        padding: 0.875rem 2rem;
        font-size: 1rem;
        font-weight: 600;
        cursor: pointer;
        transition: opacity 0.2s;
      }
      .retry-btn:hover { opacity: 0.9; }
    </style>
  </head>
  <body>
    <div class="icon">📶</div>
    <h1>You're offline</h1>
    <p>TherapyCareNow needs an internet connection to find providers and resources. Please check your connection and try again.</p>

    <div class="crisis-box">
      <h2>🆘 In a crisis? These always work:</h2>
      <a href="tel:988">Call or Text 988</a>
      <a href="sms:741741?body=HOME">Text HOME to 741741</a>
      <a href="tel:911">Call 911</a>
    </div>

    <button class="retry-btn" onclick="window.location.reload()">Try Again</button>
  </body>
</html>
